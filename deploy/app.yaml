apiVersion: v1
kind: ConfigMap
metadata:
  name: two-towers-config
  namespace: two-towers
data:
  TTT_BIND_HOST: "0.0.0.0"
  TTT_HTTP_PORT: "8080"
  TTT_MONGO_DATABASE: "sample_media"
  TTT_SNAPSHOT_PATH: "/srv/app/snapshot/catalog.json"
  TTT_AFFINITY_PATH: "/srv/app/snapshot/affinities.json"
  TTT_SIGNATURE_WIDTH: "28"
  TTT_VECTOR_URL: "http://two-towers-qdrant:6333"
  TTT_VECTOR_COLLECTION: "ttt-clips"
  TTT_VECTOR_DIMENSION: "28"
  TTT_MAX_CANDIDATES: "1200"
  TTT_MAX_CURSOR_SEEN: "500"
  TTT_FRESHNESS_HALF_LIFE_HOURS: "18"
  TTT_EXPLORATION_SCALE: "0.12"
  TTT_DIVERSITY_SCALE: "0.22"
---
apiVersion: v1
kind: Secret
metadata:
  name: two-towers-secrets
  namespace: two-towers
type: Opaque
stringData:
  TTT_MONGO_DSN: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: two-towers-api
  namespace: two-towers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: two-towers-api
  template:
    metadata:
      labels:
        app: two-towers-api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/the-two-towers:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: two-towers-config
            - secretRef:
                name: two-towers-secrets
          volumeMounts:
            - name: snapshot
              mountPath: /srv/app/snapshot
          readinessProbe:
            httpGet:
              path: /status/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status/alive
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: snapshot
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: two-towers-api
  namespace: two-towers
spec:
  selector:
    app: two-towers-api
  ports:
    - name: http
      port: 80
      targetPort: http
