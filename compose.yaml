services:
  app:
    build:
      context: .
    command: ["python", "-m", "watchtower.app"]
    env_file:
      - public.env.sample
    environment:
      TTT_BIND_HOST: 0.0.0.0
      TTT_VECTOR_URL: http://qdrant:6333
    ports:
      - "8080:8080"
    volumes:
      - ./snapshot:/srv/app/snapshot
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
