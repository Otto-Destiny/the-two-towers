name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .[dev,data]

      - name: Test
        run: python -m pytest checks

      - name: Build image
        run: docker build -t the-two-towers:ci .
